# 多轮 Agent / 工具调用 GRPO 模板（NeMo-RL 较新特性）。字段以所用版本为准。
policy:
  model_name: "Qwen/Qwen3.5-9B"
  max_seq_len: 8192            # 多轮上下文更长
  precision: bf16

reference:
  enabled: true

# 多轮环境 / 工具定义：每一轮模型可调用工具，环境返回 observation
environment:
  type: multi_turn_tool        # 多轮工具调用环境
  max_turns: 8
  tools: "common.tools.registry"   # 工具注册表（示例）
  # 工具执行 / 环境实现放 common/ 下，按实验复用

data:
  task_path: "datasets/<name>/tasks.jsonl"

grpo:
  num_generations: 8           # 每个 task 采样的轨迹数
  kl_coeff: 0.001
  global_batch_size: 32
  micro_batch_size: 1
  lr: 1.0e-6
  max_new_tokens: 1024
  temperature: 1.0

# 奖励：可基于最终任务成败 + 过程（工具调用是否合法等）
reward:
  fn: "common.rewards.agent_reward:compute_reward"

rollout:
  backend: vllm

logger:
  swanlab:
    project: "agent-grpo_qwen3.5-9b_<dataset>_v1"
    experiment_name: "turns8-g8-kl0.001"
    tags: ["agent-grpo", "multi-turn", "qwen3.5-9b"]

output_dir: "outputs"
