# 多轮 Agent / 工具调用 GRPO 推荐 override
# 入口：examples/run_grpo.py；基底建议用官方多轮示例（如 grpo_sliding_puzzle.yaml）或带自定义环境的配置。
# 多轮 = GRPO + max_rollout_turns>1 + 自定义 Environment（奖励来源）。

# ===== 模型 =====
policy.model_name=Qwen/Qwen3.5-9B
policy.max_total_sequence_length=8192          # 多轮上下文更长
policy.optimizer.kwargs.lr=1.0e-6

# ===== 多轮 rollout =====
grpo.max_rollout_turns=8                        # 每条轨迹最多多少轮
grpo.num_prompts_per_step=32
grpo.num_generations_per_prompt=8
loss_fn.reference_policy_kl_penalty=0.01

# ===== 环境（奖励来源）=====
# 自定义多轮/工具环境实现见 common/environments/，并在 data.default.env_name 指向你注册的环境名：
# data.default.env_name=<your_env_name>

# ===== SwanLab =====
logger.swanlab_enabled=true
logger.swanlab.project=agent-grpo_qwen3.5-9b_<dataset>_v1
logger.swanlab.name=turns8-g8-kl0.01
logger.monitor_gpus=true
