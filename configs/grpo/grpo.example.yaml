# GRPO 模板（NeMo-RL）。字段以所用版本为准；硬件并行度放 cluster/<profile>/profile.yaml。
policy:
  model_name: "Qwen/Qwen3.5-9B"
  max_seq_len: 4096
  precision: bf16

# 参考模型（KL 约束用），通常与 policy 同初始化
reference:
  enabled: true

data:
  prompt_path: "datasets/<name>/prompts.jsonl"
  prompt_template: chat

grpo:
  num_generations: 8          # 每个 prompt 的采样数（group size）
  kl_coeff: 0.001
  global_batch_size: 64
  micro_batch_size: 1
  lr: 1.0e-6
  max_new_tokens: 1024
  temperature: 1.0

# 奖励：引用 common/rewards/ 下的奖励函数
reward:
  fn: "common.rewards.math_reward:compute_reward"   # 示例

rollout:
  backend: vllm               # 资源占比在 cluster/<profile>/profile.yaml

logger:
  swanlab:
    project: "grpo_qwen3.5-9b_<dataset>_v1"
    experiment_name: "lr1e6-bs64-kl0.001-g8"
    tags: ["grpo", "qwen3.5-9b"]

output_dir: "outputs"
