# GRPO 推荐 override（基底：examples/configs/grpo_math_1B.yaml，入口：examples/run_grpo.py）
# 拷到实验目录 overrides.conf 后按需修改。每行一个 key=value。

# ===== 模型 =====
policy.model_name=Qwen/Qwen3.5-9B
policy.max_total_sequence_length=4096
policy.optimizer.kwargs.lr=1.0e-6

# ===== GRPO 关键超参 =====
grpo.num_prompts_per_step=32
grpo.num_generations_per_prompt=16
grpo.max_rollout_turns=1
loss_fn.reference_policy_kl_penalty=0.01

# ===== 数据集 / 环境 =====
# 数学等内置环境用默认即可；自定义数据集见官方 docs/guides/grpo.md#datasets：
# data.train.data_path=/abs/path/train.jsonl
# data.train.input_key=question
# data.default.dataset_name=ResponseDataset
# data.default.env_name=math

# ===== SwanLab =====
logger.swanlab_enabled=true
logger.swanlab.project=grpo_qwen3.5-9b_<dataset>_v1
logger.swanlab.name=lr1e6-g16-kl0.01
logger.monitor_gpus=true
