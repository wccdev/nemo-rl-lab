# SFT 推荐 override（基底：examples/configs/sft.yaml，入口：examples/run_sft.py）
# 拷到实验目录 overrides.conf 后按需修改。每行一个 key=value。

# ===== 模型 =====
policy.model_name=Qwen/Qwen3.5-4B
policy.max_total_sequence_length=4096
policy.train_global_batch_size=32
policy.train_micro_batch_size=1
policy.optimizer.kwargs.lr=5.0e-6

# ===== 训练步数 =====
sft.max_num_epochs=3
sft.val_period=50

# ===== 数据集（二选一）=====
# A) HuggingFace / 内置：
# data.train.dataset_name=squad
# B) 本地 jsonl（OpenAI messages 格式）：
# data.train_data_path=/abs/path/train.jsonl
# data.val_data_path=/abs/path/val.jsonl
# data.chat_key=messages

# ===== SwanLab =====
logger.swanlab_enabled=true
logger.swanlab.project=sft_qwen3.5-4b_<dataset>_v1
logger.swanlab.name=lr5e6-bs32
logger.monitor_gpus=true
