# 实验配置：继承基底 + 模型片段，只写本实验差异（NeMo-RL 0.6.0 原生 defaults 机制）。
# 调参就改下面「本实验差异」部分；基底不动。
#
# 切换方法：
#   - SFT       : 把第一个 default 换成 ../../configs/base/sft.yaml，并设 run.sh 的 ENTRY=examples/run_sft.py
#   - 多轮 Agent: 换成 ../../configs/base/grpo_sliding_puzzle.yaml（已含 max_rollout_turns/env 范例）
defaults:
  - ../../configs/base/grpo_math_1B.yaml
  - ../../configs/models/qwen3.5-4b.yaml

# ===================== 本实验差异 =====================
policy:
  max_total_sequence_length: 4096
  optimizer:
    kwargs:
      lr: 1.0e-6

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1            # 多轮 Agent 设 >1

loss_fn:
  reference_policy_kl_penalty: 0.01

# 数据集（按实际填写，见 common/data/README.md 与官方 docs/guides/grpo.md）
# data:
#   train:
#     data_path: /abs/path/train.jsonl
#     input_key: question
#   default:
#     dataset_name: ResponseDataset
#     env_name: math

logger:
  swanlab_enabled: true
  swanlab:
    project: "<method>_<model>_<dataset>_<tag>"   # 对齐实验目录名
    name: "<超参组合>"                            # 如 lr1e6-g16-kl0.01
  monitor_gpus: true
# =====================================================
# 注：checkpoint 目录与 log 目录由 run.sh 自动指到本实验 outputs/（已 .gitignore），
#     集群/硬件相关（节点数、并行度）由 cluster/<profile>/overrides.conf 在运行时叠加。
#     本实验默认集群写在同目录 cluster 文件（lab new --cluster 设置）；下列数值应按该卡显存调。
