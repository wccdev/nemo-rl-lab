# 实验级 NeMo-RL override（每行一个 key=value，# 为注释）。
# 从 configs/<method>/overrides.example.conf 拷对应内容进来再改。
# 同时记得在 run.sh 顶部设置 ENTRY 与 BASE_CONFIG。

# ===== 模型 =====
policy.model_name=Qwen/Qwen3.5-4B
policy.max_total_sequence_length=4096
policy.optimizer.kwargs.lr=1.0e-6

# ===== 方法超参（按 SFT / GRPO / Agent 调整）=====
grpo.num_prompts_per_step=32
grpo.num_generations_per_prompt=16
grpo.max_rollout_turns=1
loss_fn.reference_policy_kl_penalty=0.01

# ===== 数据集（按实际填写，见 configs/ 与官方 guides）=====
# data.train.data_path=/abs/path/train.jsonl
# data.train.input_key=question

# ===== SwanLab（project/name 对齐实验目录名与超参）=====
logger.swanlab_enabled=true
logger.swanlab.project=<method>_<model>_<dataset>_<tag>
logger.swanlab.name=<超参组合>
logger.monitor_gpus=true
