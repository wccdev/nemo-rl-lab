# 硬件 profile: 2x DGX Spark GB10
# NeMo-RL CLI 覆盖项，每行一个 key=value，被实验 run.sh 读取并追加到训练命令。
# 详见官方：examples/run_grpo.py --config <yaml> key=value ...

# Ray 集群：2 节点，每节点 1 颗 GB10
cluster.num_nodes=2
cluster.gpus_per_node=1

# GB10 为统一内存 + 跨节点 TP 不划算：TP=1，靠 DTensor/FSDP 在 2 卡上做分片
policy.dtensor_cfg.tensor_parallel_size=1
policy.generation.vllm_cfg.tensor_parallel_size=1

# 生成与训练共用 GPU（资源紧张时保持 colocated）
policy.generation.colocated.enabled=true
