# 多轮多工具 Agent（检索 + 计算 + 代码执行）GRPO 实验配置。
# 继承官方多轮基底 grpo_sliding_puzzle.yaml + qwen3.5-9b 片段，只写差异。
# 环境是自定义多工具环境（common/environments/example_tool_env.py），由本目录 run.py 实例化
# （task_name=tool_agent，读取 env.tool_agent.cfg）。
defaults:
  - ../../configs/base/grpo_sliding_puzzle.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/base/grpo_megatron.yaml # Megatron-Core 后端 + GB10 调优（删此行即切回 DTensor）
  - ../../configs/base/grpo_lora.yaml # LoRA（删此行即全参数，并把 lr 写回 megatron_cfg.optimizer）
  - ../../configs/base/grpo_noncolocated.yaml # 非 colocated 生成（1 卡生成 / 1 卡训练；删此行即回 colocated）

# ══════════════════════════════════════════════════════════════════════════
#  调参速查 —— 你主要动【① 调参区】这几行。硬件/分布式在 cluster/<profile>，不在这。
# ──────────────────────────────────────────────────────────────────────────
#  lr / dim / alpha                       默认来自 grpo_lora 基底(lr 1e-4 / dim8 / alpha16)
#  reference_policy_kl_penalty (loss_fn)  贴原模型力度。0~0.05。大→稳但慢；小→快但易跑偏/退化
#  num_generations_per_prompt (grpo)      每题采样数（组内基线）。8=有对有错才有梯度练难例
#  max_rollout_turns / env.tool_agent.cfg.max_turns  多轮上限（两者须对齐）
#  max_total_sequence_length (policy)     上下文长度（本任务 ~279 token，1280 够用）
#  env.tool_agent.cfg.*                   出题难度：max_number / num_operands / code_timeout
#  max_num_steps / val_period (grpo)      训多久 / 多久验证一次
# ══════════════════════════════════════════════════════════════════════════

# ───────────────────────────── ① 调参区（按需改）─────────────────────────────
policy:
  # 用已缓存且实测跑通的 base 模型（HF_HOME 里已有，避免再走镜像下大文件）。
  # 想换 instruct 版改成 "Qwen/Qwen3.5-9B"（需先 prefetch）。
  model_name: "Qwen/Qwen3.5-9B-Base"
  tokenizer:
    name: "Qwen/Qwen3.5-9B-Base"
  # seq 对齐你在同硬件稳跑 19h 的 grpo_math_9B_megatron(=1250)。
  # 2048 会让统一内存基线偏高、长跑累积顶爆(实测 seq=2048 跑到 step36 host RAM OOM)。
  # 本任务实测平均每条仅 ~279 token，1280 绰绰有余。OOM 再降到 1024。
  max_total_sequence_length: 1280
  train_global_batch_size: 32 # = num_prompts_per_step * num_generations_per_prompt（4×8）；与你数学 9B 跑通的 global=32 一致
  generation_batch_size: 32
  generation:
    # 多轮：限制每轮生成长度，避免 base 模型早期一轮写满整段预算；给 6 轮留空间、省 KV。
    # 模型学会用 </tool>/</answer> 停下后，实际会更短。
    max_new_tokens: 512

  # ⚠️ 不要在本机型上开 dynamic_batching：2×GB10 统一内存(CPU+GPU 共 ~122GB)对 9B 几乎无余量，
  #    打包更大的 microbatch 会把统一内存顶爆 → 训练步 host RAM OOM。
  #    保持 mbs=1 + seq=1280（实测稳定）。g=8/global=32 在你数学 9B 跑通的显存范围内。

grpo:
  num_prompts_per_step: 4 # GB10 实测小 batch
  num_generations_per_prompt: 8 # 每题 8 条生成：组内有对有错→leave-one-out 优势非零，GRPO 才有梯度去练残留难例（冲高准确率的关键）
  max_rollout_turns: 6 # 多轮：工具调用 + 答题，最多 6 轮
  max_num_steps: 100 # 任务 ~50 步收敛；100 步留足余量，~10h
  val_period: 25 # 验证密一点(step 0/25/50/75/100)，报告曲线更平滑
  val_at_start: true
  val_at_end: true
  max_val_samples: 64
  val_batch_size: 32 # <= max_val_samples

loss_fn:
  reference_policy_kl_penalty: 0.01 # 贴原模型力度；0=纯追奖励易退化，过大学不动

# ────────────────────────── ② 一般不动（数据 / 工具环境 / 日志）──────────────────────────
data:
  add_system_prompt: false
  shuffle: false

# 自定义工具环境配置；_override_ 整段替换基底的 env（sliding_puzzle_game）
env:
  _override_: true
  tool_agent:
    cfg:
      max_turns: 6
      answer_tolerance: 1.0e-6
      max_number: 50 # 生成题目数值范围
      num_operands: 3 # calc 题操作数个数
      code_timeout: 5 # python 工具执行超时（秒）

logger:
  wandb_enabled: false
  tensorboard_enabled: false
  swanlab_enabled: true
  monitor_gpus: true
  num_val_samples_to_print: 3 # 每次验证把 3 条完整对话(含工具调用)打印到作业日志(ray job logs)
  swanlab:
    project: "agent-grpo_qwen3.5-9b_multitool_v1"
    name: "g8-seq1280-fresh"
