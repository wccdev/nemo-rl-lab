# 题库「多轮 + 本地文档检索」Agent GRPO 实验：qwen3.5-9b 在自有技术培训考题上做强化训练。
# 继承官方单轮基底 grpo_math_1B + qwen3.5-9b 片段，只写差异。
# 奖励是自定义环境 QADocsAgentEnv（common/environments/qa_docs_agent_env.py），由本目录 run.py 实例化
# （task_name=qa_docs，读取 env.qa_docs.cfg）。最终判分复用 common/rewards 的 qa 奖励（与单轮实验同源）。
#
# ★ 对比实验【实验二 / treatment】：多轮、可调用 <search> 在集群容器内 grep 本地资料（/data/docs 下 markdown）再作答。
#   对照基线【实验一 / baseline】= grpo_qwen3.5-9b_qa-rl_v1（单轮、无工具）。
#   两者共用同一数据集 / 模型 / LoRA / batch / 裁判奖励，唯一差异是「能否多轮检索本地资料」。
#   ⚠️ 资料目录由 DOCS_DIR 控制（默认 /data/docs）；目录不存在时 <search> 返回占位提示，流程可跑通但拿不到资料。
defaults:
  - ../../configs/base/grpo_math_1B.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/base/grpo_megatron.yaml # Megatron-Core 后端（删此行即切回 DTensor）
  - ../../configs/base/grpo_lora.yaml # LoRA（删此行即全参数，并把 lr 写回 megatron_cfg.optimizer）
  # - ../../configs/base/grpo_noncolocated.yaml  # 非 colocated 生成（1 卡生成 / 1 卡训练；删此行即回 colocated）

# ══════════════════════════════════════════════════════════════════════════
#  调参速查 —— 你主要动【① 调参区】这几行。硬件/分布式在 cluster/<profile>，不在这。
#  本实验目标集群：见同目录 cluster 文件；下列数值按该卡显存调，换卡 lab submit --profile 覆盖（通常要重调）。
#  ⚠️ 这是对比实验 treatment：batch/模型/LoRA/裁判须与 qa-rl_v1 严格一致，核心变量是「多轮+检索」。
#     注：seq 有意比 baseline 大（1536→3072）——多轮轨迹要装下「检索回灌+作答」，1536 会截断答案、反而不公平。
# ──────────────────────────────────────────────────────────────────────────
#  lr / dim / alpha                       默认来自 grpo_lora 基底(lr 1e-4 / dim8 / alpha16)
#  reference_policy_kl_penalty (loss_fn)  贴原模型力度。0~0.05。大→稳但慢；小→快但易跑偏/退化
#  num_generations_per_prompt (grpo)      每题采样数（组内基线）。多→梯度稳但更慢更吃显存
#  max_rollout_turns / env.qa_docs.cfg.max_turns  多轮上限（两者须对齐）。多→更吃内存
#  max_total_sequence_length (policy)     ★整条多轮轨迹(prompt+所有轮+所有检索回灌)的总预算，不是每轮。
#                                          多轮必须比 baseline 大：1536 连「搜一次+作答」都塞不下，会在写 \boxed 前被截断
#  max_num_steps / val_period (grpo)      训多久 / 多久验证一次
# ══════════════════════════════════════════════════════════════════════════

# ───────────────────────────── ① 调参区（按需改）─────────────────────────────
policy:
  # 用已完整缓存的 base 模型（与基线 qa-rl_v1 必须一致，对比才公平）。
  model_name: "Qwen/Qwen3.5-9B-Base"
  tokenizer:
    name: "Qwen/Qwen3.5-9B-Base"
  # ⚠️ 这是【整条多轮轨迹】的总预算：prompt + preamble + 所有轮生成 + 所有检索回灌，全部累加。
  #    1536（=baseline 单轮值）对多轮是错的：仅「prompt(~550)+搜一次(≤512)+回灌(~300)+作答(~512)」
  #    就 ≈1900>1536 → 在写 \boxed 前被截断 → 判 0。这正是初始 truncation_rate 0.6~0.9、准确率仅 15% 的根因。
  #    故抬到 3072，让「检索一次+作答」乃至两次检索都能完整放下，截断率才回得来。
  #    H100(80GB) 显存宽裕，3072 毫无压力
  max_total_sequence_length: 3072
  train_global_batch_size: 64 # = num_prompts_per_step * num_generations_per_prompt（4×16）。★与 MaxRL v2 对齐：同 N 才能干净对比
  generation_batch_size: 16
  generation:
    max_new_tokens: 1480 # 每轮生成上限：一次检索查询很短，作答留足空间

grpo:
  num_prompts_per_step: 4 # 与 baseline 一致
  # ★ 与 MaxRL v2 对齐到同一采样数 N=16：对比必须同 N，否则混入「8 vs 16 rollout」第二变量。
  #   注：GRPO 加大 N 基本只降方差、不改目标（pass@1）；MaxRL 加大 N 会逼近 MLE。这正是本对比要凸显的差异。
  num_generations_per_prompt: 16 # 与 MaxRL v2 一致（GRPO 组内基线）
  max_rollout_turns: 3 # 多轮：最多 3 轮（典型 1 次检索 + 作答）
  max_num_steps: 800 # 与 baseline 对齐；~100-200 步即收敛，val_at_end 兜底
  val_period: 50
  val_at_start: true
  val_at_end: true
  max_val_samples: 256
  val_batch_size: 64 # <= max_val_samples

loss_fn:
  reference_policy_kl_penalty: 0.01 # 贴原模型力度；0=纯追奖励易退化，过大学不动

# ────────────────────────── ② 一般不动（数据 / 检索判分环境 / 日志）──────────────────────────
# run.py 读取以下键自建数据集（与 baseline 同一份题库；run.py 会在 query 前加"可检索"说明）。
data:
  shuffle: true
  input_key: query
  output_key: expected_answer
  system_prompt: null
  # 题库在集群共享盘的绝对路径（容器内可达）。私有题库不随包上传（.gitignore），故在此显式指定；
  # run.py 优先用服务端注入的环境变量 QA_RL_DATA_DIR，没有才用这里。
  data_dir: /data/datasets/qa_rl

# 自定义多轮检索判分环境；_override_ 整段替换基底的 env（math）。
env:
  _override_: true
  qa_docs:
    cfg:
      # true：简答题最终答案用裁判 LLM（需 JUDGE_* 环境变量；连不上自动回退关键词覆盖率）
      # false：全部走规则判分，零成本、无需裁判端点。与 baseline 必须一致才公平。
      use_judge: true
      max_turns: 3 # 与 grpo.max_rollout_turns 对齐
      # ── 检索 reward shaping：让模型真正用上 <search>，而不是退化成闭卷瞎猜（卡 ~62% 的主因）──
      #    search_step_reward   每次「真取回资料」的即时奖励（远小于答对 1.0，仅作探索引导）
      #    answer_search_bonus  「检索过且最终答对」的一次性加成（奖励靠检索拿分而非蒙）
      #    search_bonus_min_score 触发上面加成的最低 base 分（1.0=只奖励完全答对）
      #    no_answer_penalty    超 max_turns 仍不作答的惩罚（让「只检索不答」净收益为负，防刷分）
      # ⚠️ 若要与 baseline 做「唯一变量=能否检索」的严格对比，把下面三项全设 0 即回到纯最终判分。
      search_step_reward: 0.05
      answer_search_bonus: 0.1
      search_bonus_min_score: 1.0
      no_answer_penalty: 0.2

logger:
  wandb_enabled: false
  tensorboard_enabled: false
  swanlab_enabled: true
  monitor_gpus: true
  num_val_samples_to_print: 16 # 每次验证把 16 条完整多轮对话(含检索)打印到作业日志；Web 面板分页查看
  swanlab:
    project: "qa-rl-compare" # 与实验一同 project，便于同图对比两条曲线
    name: "treatment-multiturn-kb"
