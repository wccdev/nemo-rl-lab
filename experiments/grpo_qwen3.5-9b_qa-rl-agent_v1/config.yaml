# 题库「多轮 + 知识库检索」Agent GRPO 实验：qwen3.5-9b 在自有技术培训考题上做强化训练。
# 继承官方单轮基底 grpo_math_1B + qwen3.5-9b 片段，只写差异。
# 奖励是自定义环境 QAKBAgentEnv（common/environments/qa_kb_agent_env.py），由本目录 run.py 实例化
# （task_name=qa_kb，读取 env.qa_kb.cfg）。最终判分复用 common/rewards 的 qa 奖励（与单轮实验同源）。
#
# ★ 对比实验【实验二 / treatment】：多轮、可调用 <search> 检索外部知识库再作答。
#   对照基线【实验一 / baseline】= grpo_qwen3.5-9b_qa-rl_v1（单轮、无工具）。
#   两者共用同一数据集 / 模型 / LoRA / batch / 裁判奖励，唯一差异是「能否多轮检索知识库」。
#   ⚠️ 知识库搭建中：未配 KB_BASE_URL 时 <search> 返回占位提示，流程可跑通但拿不到真实资料。
defaults:
  - ../../configs/base/grpo_math_1B.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/base/grpo_megatron.yaml   # Megatron-Core 后端 + GB10 调优（删此行即切回 DTensor）
  - ../../configs/base/grpo_lora.yaml       # LoRA（删此行即全参数，并把 lr 写回 megatron_cfg.optimizer）
  - ../../configs/base/grpo_noncolocated.yaml  # 非 colocated 生成（1 卡生成 / 1 卡训练；删此行即回 colocated）

policy:
  # 用已完整缓存的 base 模型（与基线 qa-rl_v1 必须一致，对比才公平）。
  model_name: "Qwen/Qwen3.5-9B-Base"
  tokenizer:
    name: "Qwen/Qwen3.5-9B-Base"
  # 多轮 + 检索结果回灌比单轮长很多：原题面 + 多次检索片段 + 作答。给到 2048。
  # ⚠️ GB10 统一内存(~122GB)对 9B 偏紧，agent 实验实测 seq=2048 长跑会 host RAM OOM。
  #    若 OOM，按顺序降：env.qa_kb.cfg.max_turns→3、qa_kb_agent_env._KB_MAX_CHARS→500、
  #    seq→1792/1536、train_global_batch_size→16 且 num_generations_per_prompt→4。
  max_total_sequence_length: 2048
  train_global_batch_size: 32          # = num_prompts_per_step * num_generations_per_prompt（4×8），与 baseline 一致
  generation_batch_size: 16
  generation:
    max_new_tokens: 512                # 每轮生成上限：一次检索查询很短，作答留足空间

grpo:
  num_prompts_per_step: 4              # 与 baseline 一致
  num_generations_per_prompt: 8        # 与 baseline 一致
  max_rollout_turns: 4                 # 多轮：最多 4 轮（典型 1~2 次检索 + 作答）
  max_num_steps: 300                   # 与 baseline 对齐；~100-200 步即收敛，val_at_end 兜底
  val_period: 50
  val_at_start: true
  val_at_end: true
  max_val_samples: 128
  val_batch_size: 64                   # <= max_val_samples

loss_fn:
  reference_policy_kl_penalty: 0.01

# run.py 读取以下键自建数据集（与 baseline 同一份题库；run.py 会在 query 前加"可检索"说明）。
data:
  shuffle: true
  input_key: query
  output_key: expected_answer
  system_prompt: null
  # data_dir: /abs/path/to/datasets/qa_rl   # 可选；一般用 QA_RL_DATA_DIR 更便携

# 自定义多轮检索判分环境；_override_ 整段替换基底的 env（math）。
env:
  _override_: true
  qa_kb:
    cfg:
      # true：简答题最终答案用裁判 LLM（需 JUDGE_* 环境变量；连不上自动回退关键词覆盖率）
      # false：全部走规则判分，零成本、无需裁判端点。与 baseline 必须一致才公平。
      use_judge: true
      max_turns: 4                     # 与 grpo.max_rollout_turns 对齐

logger:
  wandb_enabled: false
  tensorboard_enabled: false
  swanlab_enabled: true
  monitor_gpus: true
  num_val_samples_to_print: 3          # 每次验证把 3 条完整多轮对话(含检索)打印到作业日志
  swanlab:
    project: "qa-rl-compare"           # 与实验一同 project，便于同图对比两条曲线
    name: "treatment-multiturn-kb"
