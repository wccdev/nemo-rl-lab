# 题库单轮 GRPO 实验：qwen3.5-9b 在自有技术培训考题上做强化训练。
# 继承官方单轮基底 grpo_math_1B + qwen3.5-9b 片段，只写差异。
# 奖励是自定义环境 QARewardEnv（common/environments/qa_env.py），由本目录 run.py 实例化
# （task_name=qa，读取 env.qa.cfg）。数据走 run.py 自建 Dataset，不用 ResponseDataset。
#
# ★ 对比实验【实验一 / baseline】：单轮、无工具——模型直接答题，环境判分即结束。
#   对照组【实验二 / treatment】= grpo_qwen3.5-9b_qa-rl-agent_v1（多轮 + 本地文档检索工具）。
#   两者共用同一数据集 / 模型 / LoRA / batch / 裁判奖励，核心差异是「能否多轮检索本地资料」。
#   注：seq 不同是有意的——baseline 单轮 1536 够用；agent 多轮要装下检索回灌+作答，需更大（3072），否则答案被截断。
defaults:
  - ../../configs/base/grpo_math_1B.yaml
  - ../../configs/models/qwen3.5-9b.yaml
  - ../../configs/base/grpo_megatron.yaml # Megatron-Core 后端（删此行即切回 DTensor）
  - ../../configs/base/grpo_lora.yaml # LoRA（删此行即全参数，并把 lr 写回 megatron_cfg.optimizer）
  # - ../../configs/base/grpo_noncolocated.yaml  # 非 colocated 生成（1 卡生成 / 1 卡训练；删此行即回 colocated）

# ══════════════════════════════════════════════════════════════════════════
#  调参速查 —— 你主要动【① 调参区】这几行。硬件/分布式在 cluster/<profile>，不在这。
#  本实验目标集群：见同目录 cluster 文件；下列数值按该卡显存调，换卡 lab submit --profile 覆盖（通常要重调）。
#  ⚠️ 这是对比实验 baseline：batch/模型/LoRA/裁判须与 qa-rl-agent_v1 严格一致，否则破坏对比。
#     （seq 例外：agent 多轮需更大预算装下检索+作答，故两边 seq 有意不同，详见 agent config 注释。）
# ──────────────────────────────────────────────────────────────────────────
#  lr / dim / alpha                       默认来自 grpo_lora 基底(lr 1e-4 / dim8 / alpha16)
#  reference_policy_kl_penalty (loss_fn)  贴原模型力度。0~0.05。大→稳但慢；小→快但易跑偏/退化
#  num_generations_per_prompt (grpo)      每题采样数（组内基线）。多→梯度稳但更慢更吃显存
#  max_total_sequence_length (policy)     上下文长度（多选题带选项较长，勿降，降会截断答案）
#  env.qa.cfg.use_judge                   简答题是否用裁判 LLM（需 JUDGE_* 环境变量）
#  max_num_steps / val_period (grpo)      训多久 / 多久验证一次
# ══════════════════════════════════════════════════════════════════════════

# ───────────────────────────── ① 调参区（按需改）─────────────────────────────
policy:
  # 用已完整缓存的 base 模型（与 agent 实验一致；instruct 版集群没下全会卡在下载）。
  # ⚠️ 对比实验二必须用同一个模型，改这里也要同步改 qa-rl-agent_v1。
  model_name: "Qwen/Qwen3.5-9B-Base"
  tokenizer:
    name: "Qwen/Qwen3.5-9B-Base"
  max_total_sequence_length: 1536 # 单轮：prompt + 一次作答。多选题带选项较长，seq 不要再降（降会截断答案，踩过坑）
  train_global_batch_size: 16 # = num_prompts_per_step * num_generations_per_prompt（4×4）
  generation_batch_size: 8
  generation:
    # ⚠️ 踩坑记录（别再动这两个值）：
    #   1) 砍到 768 提速 → Base 推理还没写到 \boxed 就被截断 → step0 基线 0.50→0.20，废。
    #   2) 加 stop_strings:["</think>"] 想省 token → Qwen 推理模板把 \boxed{} 放在 </think> *之后*，
    #      在 </think> 停正好切掉答案 → step0 0.50→0.18，更废。
    #   实测：纯 1536、不加 stop 时 step0=0.50、step1 reward≈0.84（最佳，就用这个）。
    #   Base 爱啰嗦导致单步 ~11 分钟是已知代价；靠 RL 逐步教会简洁后会自然变快，不要再用截断/stop 硬压。
    max_new_tokens: 1536

grpo:
  num_prompts_per_step: 4 # 小 batch
  num_generations_per_prompt: 4 # 组内基线；4 样本对 GRPO LOO 仍有效
  max_rollout_turns: 1 # 单轮：答一道题，环境判分即结束
  max_num_steps: 300 # 这类任务 ~100-200 步即收敛，500 多为空转；val_at_end 兜底
  val_period: 50
  val_at_start: true
  val_at_end: true
  max_val_samples: 128
  val_batch_size: 64 # <= max_val_samples

loss_fn:
  reference_policy_kl_penalty: 0.01 # 贴原模型力度；0=纯追奖励易退化，过大学不动

# ────────────────────────── ② 一般不动（数据 / 判分环境 / 日志）──────────────────────────
# run.py 读取以下键自建数据集（不走 ResponseDataset）。
# 数据目录优先用环境变量 QA_RL_DATA_DIR，其次用这里的 data_dir。
data:
  shuffle: true
  input_key: query
  output_key: expected_answer
  system_prompt: null
  # 题库在集群共享盘的绝对路径（容器内可达）。私有题库不随包上传（.gitignore），故在此显式指定；
  # run.py 优先用服务端注入的环境变量 QA_RL_DATA_DIR，没有才用这里。
  data_dir: /data/datasets/qa_rl

# 自定义判分环境；_override_ 整段替换基底的 env（math）。
env:
  _override_: true
  qa:
    cfg:
      # true：简答题用裁判 LLM（需 JUDGE_BASE_URL 等环境变量；连不上自动回退关键词覆盖率）
      # false：全部走规则判分，零成本、无需裁判端点
      use_judge: true

logger:
  wandb_enabled: false
  tensorboard_enabled: false
  swanlab_enabled: true
  monitor_gpus: true
  num_val_samples_to_print: 16 # 每次验证把 16 条完整对话(含生成 token)打印到作业日志(ray job logs)；Web 面板分页查看
  swanlab:
    project: "qa-rl-compare" # 与实验二同 project，便于在 SwanLab 同图对比两条曲线
    name: "baseline-singleturn-notool"
