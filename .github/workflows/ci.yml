name: CI

# 本机 CLI / 数据 / 奖励 / config 校验的轻量门禁（不跑 GPU 训练，那在集群容器里）。
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dev deps
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run --extra dev ruff check nemo_rl_lab tests common/rewards

      - name: Pytest
        run: uv run --extra dev pytest -q

      - name: lab CLI smoke
        run: |
          uv run lab --help
          uv run lab ls
          uv run lab validate grpo_qwen3.5-4b_gsm8k_v1

      - name: lab.cmd smoke (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: lab.cmd --help
